<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juan Chavez Engineer | Website</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li><a href="projects.html">Projects</a></li>
                </ul>
            </nav>
        </header>

        <main class="h-feed" itemscope itemtype="https://schema.org/Blog">
            <article>
                <ul>
                    {% for post in site.posts %}
                    <li style="margin-bottom: 40px; text-decoration: none;">
                        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                        <span class="post-date">{{ post.date | date: "%d/%m/%Y" }}</span>

                        <div class="resumo-artigo">
                            {{ post.excerpt }}
                        </div>

                        <a href="{{ post.url }}">Leia o artigo completo →</a>
                    </li>
                    {% endfor %}
                </ul>

            </article>

        </main>

        <footer itemprop="author" itemscope itemtype="https://schema.org/Person">
            <p>&copy; 2025 <span itemprop="name">Juan Chavez</span></p>
        </footer>

    </div>
</body>

</html>
